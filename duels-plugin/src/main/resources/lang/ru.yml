# DO NOT EDIT THIS VALUE!
config-version: 16

STRINGS:
  PREFIX: '&9[Duels]'
  LINE: '&9&m------------------------------------&r'
  HALF_LINE: '&9&m----------------&r'
  FAIL_PREFIX: '&cОшибка запуска матча:'


GENERAL:
  true: '&aда'
  false: '&cнет'
  enabled: '&aвключено'
  disabled: '&cотключено'
  not-selected: 'Не выбрано'
  random: 'Случайно'
  none: 'нет'
  kit-selector: 'Выбор кита'
  arena-selector: 'Выбор арены'
  item-betting: 'Ставка предметами'
  betting: 'Ставка'


ERROR:
  no-permission: '{PREFIX} &cУ тебя нет права: ''%permission%'''
  data:
    load-failure: '{PREFIX} &cНе удалось загрузить статистику дуэлей. Попробуй перезайти.'
    not-loaded: '{PREFIX} &cПользователи ещё загружаются, попробуй позже.'
    not-found: '{PREFIX} &cУ %name% нет статистики дуэлей.'
  top:
    no-data-available: '{PREFIX} &cДанных нет.'
  player:
    not-found: '{PREFIX} &c%name% не в сети.'
    no-longer-online: '{PREFIX} &cЭтот игрок больше не в сети.'
  arena:
    not-found: '{PREFIX} &cАрена с названием ''%name%'' не найдена.'
    already-exists: '{PREFIX} &cАрена с названием ''%name%'' уже существует.'
    delete-failure: '{PREFIX} &cНельзя удалить арену, которая сейчас используется. Сначала отключи её командой ''/duels toggle %name%'''
    invalid-position: '{PREFIX} &cПозиция должна быть 1 или 2.'
    no-position-set: '{PREFIX} &cДля арены ''%name%'' не установлены позиции.'
    empty-hand: '{PREFIX} &cДля этой команды нужно держать предмет в руке.'
  kit:
    not-found: '{PREFIX} &cКит с названием ''%name%'' не найден.'
    already-exists: '{PREFIX} &cКит с названием ''%name%'' уже существует.'
    empty-hand: '{PREFIX} &cДля этой команды нужно держать предмет в руке.'

  player-only: '{PREFIX} &cЭту команду могут использовать только игроки.'
  duel:
    is-self: '{PREFIX} &cТы не можешь вызвать самого себя на дуэль.'
    inventory-not-empty: '{PREFIX} &cИнвентарь должен быть пустым для использования этой команды.'
    in-creative-mode: '{PREFIX} &cНельзя проводить дуэль в режиме творчества.'
    in-blacklisted-world: '{PREFIX} &cНельзя проводить дуэль в этом мире.'
    is-tagged: '{PREFIX} &cНельзя проводить дуэль во время боя.'
    in-cooldown: '{PREFIX} &c%name% находится в кулдауне дуэли ещё %time%.'
    not-in-duelzone: '{PREFIX} &cДуэли можно проводить только в следующих регионах: %regions%'
    requests-disabled: '{PREFIX} &c%name% в данный момент не принимает запросы на дуэль.'
    already-has-request: '{PREFIX} &cТы уже отправил запрос игроку %name%.'
    no-request: '{PREFIX} &cУ тебя нет запроса от %name%.'
    already-in-match:
      sender: '{PREFIX} &cТы не можешь сделать это во время дуэли.'
      target: '{PREFIX} &c%name% уже участвует в дуэли.'
    mode-unselected: '{PREFIX} &cНеобходимо выбрать кит или включить режим своего инвентаря.'
    mode-fixed: '{PREFIX} &cТебе не разрешено отключать режим своего инвентаря.'
    already-spectating:
      sender: '{PREFIX} &cТы не можешь сделать это в режиме наблюдателя.'
      target: '{PREFIX} &c%name% находится в режиме наблюдателя.'
    not-in-match: '{PREFIX} &c%name% не участвует в дуэли.'
    prevent-teleportation: '{PREFIX} &cНельзя телепортироваться к этому игроку — он участвует в дуэли.'
  party-duel:
    inventory-not-empty: '{PREFIX} &cТы и члены группы должны иметь пустой инвентарь.'
    in-creative-mode: '{PREFIX} &cТы или член группы находится в режиме творчества.'
    in-blacklisted-world: '{PREFIX} &cТы или член группы находится в заблокированном мире.'
    is-tagged: '{PREFIX} &cТы или член группы находится в бою.'
    not-in-duelzone: '{PREFIX} &cТы или член группы не в одном из следующих регионов: %regions%'
    already-has-request: '{PREFIX} &cТы уже отправил запрос группе %name%.'
    no-request: '{PREFIX} &cУ тебя нет запроса от группы %name%.'
    already-in-match:
      sender: '{PREFIX} &cТы не можешь делать это, пока группа в дуэли.'
      target: '{PREFIX} &cГруппа %name% уже участвует в дуэли.'
    already-spectating:
      sender: '{PREFIX} &cТы не можешь делать это, пока ты или член группы — наблюдатель.'
      target: '{PREFIX} &cЧлен группы %name% находится в режиме наблюдателя.'
    option-unavailable: '{PREFIX} &cСтавки предметами/деньгами недоступны для групповых дуэлей.'
  party:
    is-self: '{PREFIX} &cНельзя создать группу с самим собой.'
    is-not-owner: '{PREFIX} &cТы должен быть лидером группы для этого действия.'
    is-owner: '{PREFIX} &cТы не можешь покинуть группу, будучи лидером. Используй ''/party transfer'' для передачи лидерства или ''/party disband'' для роспуска.'
    requests-disabled: '{PREFIX} &c%name% в данный момент не принимает приглашения в группу.'
    already-has-invite: '{PREFIX} &cТы уже отправил приглашение игроку %name%.'
    no-invite: '{PREFIX} &cУ тебя нет приглашения от %name%.'
    not-found: '{PREFIX} &cЭта группа больше не существует.'
    already-in-party:
      sender: '{PREFIX} &cТы не можешь делать это, находясь в группе.'
      target: '{PREFIX} &c%name% уже состоит в группе.'
    not-in-party:
      sender: '{PREFIX} &cТы должен быть в группе для этого действия.'
      target: '{PREFIX} &c%name% не состоит в группе.'
    not-a-member: '{PREFIX} &c%name% не является членом твоей группы.'
    in-same-party: '{PREFIX} &c%name% уже в твоей группе.'
    kick-self: '{PREFIX} &cНельзя исключить самого себя из группы.'
    is-not-same-size: '{PREFIX} &cРазмеры групп должны совпадать для этого действия.'
    is-not-online:
      sender: '{PREFIX} &cВсе члены твоей группы должны быть в сети!'
      target: '{PREFIX} &cВсе члены группы %name% должны быть в сети!'
    max-size-reached:
      sender: '{PREFIX} &cТвоя группа достигла максимального количества участников!'
      target: '{PREFIX} &cГруппа %name% достигла максимального количества участников!'
    cannot-friendly-fire: '{PREFIX} &cДружественный огонь запрещён.'
  setting:
    disabled-option: '{PREFIX} &c%option% в данный момент отключено.'
    arena-not-applicable: '{PREFIX} &cНельзя использовать кит %kit% на арене %arena%.'
  inventory-view:
    not-a-uuid: '{PREFIX} &c%input% не является корректным UUID.'
    not-found: '{PREFIX} &cИнвентарь с UUID ''%uuid%'' не найден.'
  queue:
    not-found: '{PREFIX} &cОчередь с китом %kit% и ставкой $%bet_amount% не найдена.'
    already-exists: '{PREFIX} &cОчередь с китом ''%kit%'' и ставкой $%bet_amount% уже существует.'
    already-in: '{PREFIX} &cТы уже находишься в очереди!'
    not-in-queue: '{PREFIX} &cТы не находишься в очереди.'
    not-enough-money: '{PREFIX} &cДля входа в эту очередь нужно $%bet_amount%.'
    party-too-large: '{PREFIX} &cВ твоей группе %party_size% игроков, но эта очередь допускает команды по %team_size% человек.'
    no-queues-available: '{PREFIX} &cНет доступных очередей.'
  sign:
    not-a-sign: '{PREFIX} &cБлок, на который ты смотришь, не является табличкой!'
    not-found: '{PREFIX} &cЭта табличка не является табличкой очереди!'
    already-exists: '{PREFIX} &cЭта табличка уже является табличкой очереди! Для удаления используй ''/duels delsign'''
    cancel-break: '{PREFIX} &cНельзя сломать табличку очереди вручную! Используй команду ''/duels delsign'''
  sound:
    not-found: '{PREFIX} &cЗвук с именем ''%name%'' не найден.'
  command:
    invalid-sub-command: '{PREFIX} &c''%argument%'' — неверная подкоманда. Введи ''/%command%'' для справки.'
    invalid-option: '{PREFIX} &c''%option%'' — неверный параметр. Доступные параметры: %available_options%'
    invalid-action: '{PREFIX} &c''%action%'' — неверное действие. Доступные действия: %available_actions%'
    not-enough-money: '{PREFIX} &cНедостаточно денег для ставки!'
    lobby-save-failure: '{PREFIX} &cНе удалось сохранить местоположение лобби. Проверь консоль для подробностей.'
    name-not-alphanumeric: '{PREFIX} &c''%name%'' не является буквенно-цифровым.'
    invalid-argument: "{PREFIX} &cНеверный аргумент: {arg}. Заполнители не разрешены в командах."


COMMAND:
  kit:
    usage: '{PREFIX} &cИспользование: /kit [edit|save|reset] [игрок] [название кита]'
    edit:
      usage: '{PREFIX} &cИспользование: /kit edit <название кита>'
    reset:
      usage: '{PREFIX} &cИспользование: /kit reset <название кита> или /kit reset <игрок> <название кита>'
    unknown-subcommand: '{PREFIX} &cНеизвестная подкоманда: %subcommand%'
  duel:
    usage:
      - '{LINE}'
      - '&f/%command% [игрок] &e- &7Отправляет запрос на дуэль игроку.'
      - '&f/%command% [игрок] <сумма> &e- &7Отправляет запрос на дуэль со ставкой.'
      - '&f/%command% [accept | deny] [игрок] &e- &7Принимает или отклоняет запрос на дуэль.'
      - '&f/%command% stats <имя> &e- &7Показывает статистику дуэлей.'
      - '&f/%command% toggle &e- &7Включить/отключить получение запросов на дуэль.'
      - '&f/%command% top [-|wins|losses|kit] &e- &7Показывает топ побед, поражений или рейтинга кита.'
      - '{LINE}'
    request:
      send:
        sender:
          - '{LINE}'
          - '&7Запрос на дуэль отправлен игроку &f%name%&7.'
          - '&6- &7Кит: &3%kit%'
          - '&6- &7Свой инвентарь: &r%own_inventory%'
          - '&6- &7Арена: &e%arena%'
          - '&6- &7Ставка: &6$%bet_amount%'
          - '&6- &7Ставка предметами: &r%item_betting%'
          - '{LINE}'
        receiver:
          - '{LINE}'
          - '&7Получен запрос на дуэль от &f%name%&7.'
          - '&6- &7Кит: &3%kit%'
          - '&6- &7Свой инвентарь: &r%own_inventory%'
          - '&6- &7Арена: &e%arena%'
          - '&6- &7Ставка: &6$%bet_amount%'
          - '&6- &7Ставка предметами: &r%item_betting%'
          - '{LINE}'
        clickable-text:
          info:
            text: '&7Нажми, чтобы '
            hover-text: ''
          accept:
            text: '&a&l[ПРИНЯТЬ] '
            hover-text: '&7Нажми, чтобы &aпринять &7этот запрос.'
          deny:
            text: '&c&l[ОТКЛОНИТЬ]'
            hover-text: '&7Нажми, чтобы &cотклонить &7этот запрос.'
      accept:
        sender: '{PREFIX} &f%name% &7принял твой запрос на дуэль.'
        receiver: '{PREFIX} &7Запрос на дуэль от &f%name%&7 принят.'
      deny:
        sender: '{PREFIX} &7Твой запрос на дуэль к &f%name% &7был отклонён.'
        receiver: '{PREFIX} &7Запрос на дуэль от &f%name%&7 отклонён.'
    party-request:
      send:
        sender-party:
          - '{LINE}'
          - '&f%owner% &7отправил запрос на дуэль группе &f%name%&7.'
          - '&6- &7Кит: &3%kit%'
          - '&6- &7Свой инвентарь: &r%own_inventory%'
          - '&6- &7Арена: &e%arena%'
          - '{LINE}'
        receiver-party:
          - '{LINE}'
          - '&7Получен запрос на дуэль от группы &f%name%&7.'
          - '&6- &7Кит: &3%kit%'
          - '&6- &7Свой инвентарь: &r%own_inventory%'
          - '&6- &7Арена: &e%arena%'
        clickable-text:
          info:
            text: '&7Нажми, чтобы '
            hover-text: ''
          accept:
            text: '&a&l[ПРИНЯТЬ] '
            hover-text: '&7Нажми, чтобы &aпринять &7этот запрос.'
          deny:
            text: '&c&l[ОТКЛОНИТЬ]'
            hover-text: '&7Нажми, чтобы &cотклонить &7этот запрос.'
          extra:
            text: '{LINE}'
            hover-text: ''
      accept:
        sender-party:
          - '{LINE}'
          - '{PREFIX} &7Группа &f%name% &7приняла запрос на дуэль от &f%owner%&7.'
          - '{LINE}'
        receiver-party:
          - '{LINE}'
          - '{PREFIX} &f%owner% &7принял запрос на дуэль от группы &f%name%&7.'
          - '{LINE}'
      deny:
        sender-party:
          - '{LINE}'
          - '{PREFIX} &7Группа &f%name% &7отклонила запрос на дуэль от &f%owner%&7.'
          - '{LINE}'
        receiver-party:
          - '{LINE}'
          - '{PREFIX} &7&f%owner%&7 отклонил запрос на дуэль от группы &f%name%&7.'
          - '{LINE}'
    stats:
      displayed:
        - '{LINE}'
        - '&7Статистика &f%name% &e-'
        - '&7Побед: &a%wins%'
        - '&7Поражений: &c%losses%'
        - '&7Соотношение П/П: &b%wl_ratio%'
        - '&7Запросы: &r%requests_enabled%'
      rating:
        header: '&7Рейтинги &e-'
        format: '&f%type%&7: &b%rating%'
        footer: ''
      match:
        header: '&7Последние матчи &e-'
        format: '&a%winner% &fпротив &c%loser% &6[Наведи курсор!]'
        hover-text:
          - '&7Кит: &3%kit%'
          - '&7Длительность: &a%duration%'
          - '&7Время: &f%time% назад'
          - '&7Здоровье: &d%health%❤'
        footer: '{LINE}'
    toggle:
      enabled: '{PREFIX} &aТеперь ты получаешь запросы на дуэль.'
      disabled: '{PREFIX} &cТеперь ты не принимаешь запросы на дуэль.'
    top:
      next-update: '{PREFIX} &7Следующее обновление: &f%remaining%'
      header: '{HALF_LINE} &7Топ &f10 &7%type% {HALF_LINE}'
      display-format: '&e%rank%. &f%name% &e- &f%score% &7%identifier%'
      footer: '{HALF_LINE} &7Топ &f10 &7%type% {HALF_LINE}'

  duels:
    usage:
      - '{LINE}'
      - '&f/%command% help &e- &7Показывает эту страницу.'
      - '&f/%command% help arena &e- &7Показывает список команд арены.'
      - '&f/%command% help kit &e- &7Показывает список команд китов.'
      - '&f/%command% help queue &e- &7Показывает список команд очереди.'
      - '&f/%command% help sign &e- &7Показывает список команд табличек.'
      - '&f/%command% help user &e- &7Показывает список команд редактирования пользователя.'
      - '&f/%command% help extra &e- &7Показывает список дополнительных команд.'
      - '{LINE}'
    help:
      arena:
        - '{HALF_LINE} &fКоманды арены {HALF_LINE}'
        - '&f/%command% create [название] &e- &7Создаёт арену с указанным названием.'
        - '&f/%command% set [название] [1|2] &e- &7Устанавливает позицию телепортации арены.'
        - '&f/%command% delete [название] &e- &7Удаляет арену.'
        - '&f/%command% setarenaitem [название] &e- &7Устанавливает отображаемый предмет для выбранной арены.'
        - '&f/%command% info [название] &e- &7Показывает информацию о выбранной арене.'
        - '&f/%command% toggle [название] &e- &7Включает или отключает арену.'
        - '&f/%command% tp [название] <1|2> &e- &7Телепортирует на арену.'
        - '&f/%command% list &e- &7Показывает список всех арен.'
        - '{HALF_LINE} &fКоманды арены {HALF_LINE}'
      kit:
        - '{HALF_LINE} &fКоманды китов {HALF_LINE}'
        - '&f/%command% savekit <-o> [название] &e- &7Сохраняет кит с указанным названием.'
        - '&f/%command% loadkit [название] &e- &7Загружает выбранный кит в инвентарь.'
        - '&f/%command% kitgive [кит] [игрок] &e- &7Выдаёт кит игроку.'
        - '&f/%command% deletekit [название] &e- &7Удаляет кит.'
        - '&f/%command% setitem [название] &e- &7Устанавливает отображаемый предмет для выбранного кита.'
        - '&f/%command% options [кит] &e- &7Открывает меню настроек для выбранного кита.'
        - '&f/%command% bind [кит] &e- &7Открывает меню привязки арен для выбранного кита.'
        - '&f/%command% list &e- &7Показывает список всех китов.'
        - '{HALF_LINE} &fКоманды китов {HALF_LINE}'
      queue:
        - '{HALF_LINE} &fКоманды очереди {HALF_LINE}'
        - '&f/%command% createqueue [ставка] [-|кит] &e- &7Создаёт очередь со ставкой и китом.'
        - '&f/%command% deletequeue &e- &7Удаляет очередь со ставкой и китом.'
        - '&f/%command% list &e- &7Показывает список доступных очередей.'
        - '{HALF_LINE} &fКоманды очереди {HALF_LINE}'
      sign:
        - '{HALF_LINE} &fКоманды табличек {HALF_LINE}'
        - '&f/%command% addsign [ставка] [-|кит] &e- &7Создаёт табличку очереди со ставкой и китом.'
        - '&f/%command% delsign &e- &7Удаляет табличку очереди, на которую ты смотришь.'
        - '&f/%command% list &e- &7Показывает список табличек очереди.'
        - '{HALF_LINE} &fКоманды табличек {HALF_LINE}'
      user:
        - '{HALF_LINE} &fКоманды редактирования пользователя {HALF_LINE}'
        - '&f/%command% setrating [имя] [-|кит] [кол-во] &e- &7Устанавливает рейтинг игрока для кита.'
        - '&f/%command% edit [имя] [add|remove|set] [wins|losses] [кол-во] &e- &7Редактирует статистику игрока.'
        - '&f/%command% resetrating [имя] [-|кит|all] &e- &7Сбрасывает рейтинг игрока для кита.'
        - '&f/%command% reset [имя] &e- &7Сбрасывает статистику игрока.'
        - '{HALF_LINE} &fКоманды редактирования пользователя {HALF_LINE}'
      extra:
        - '{HALF_LINE} &fДополнительные команды {HALF_LINE}'
        - '&f/%command% setlobby &e- &7Устанавливает местоположение лобби дуэлей.'
        - '&f/%command% lobby &e- &7Телепортирует в лобби дуэлей.'
        - '&f/%command% playsound [название] &e- &7Воспроизводит выбранный звук, если он определён в конфиге.'
        - '&f/%command% reload <модуль> &e- &7Перезагружает плагин или указанный модуль.'
        - '{HALF_LINE} &fДополнительные команды {HALF_LINE}'
    create: '{PREFIX} &7Арена &e%name% &7успешно создана. Для установки точек появления используй команду &f/duels set %name% 1'
    delete: '{PREFIX} &7Арена &e%name% &7успешно удалена.'
    set: '{PREFIX} &7Позиция &f%position% &7для арены &e%name% &7установлена в &f%location%&7.'
    toggle: '{PREFIX} &7Арена &e%name% &7теперь &r%state%&7.'
    disable: '{PREFIX} &7Арена &e%name% &7отключена.'
    enable: '{PREFIX} &7Арена &e%name% &7включена.'
