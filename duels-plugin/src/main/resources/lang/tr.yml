    already-in: '{PREFIX} &cZaten bir kuyruktasın!'
    not-in-queue: '{PREFIX} &cHerhangi bir kuyrukta değilsin.'
    not-enough-money: '{PREFIX} &cO kuyruğa katılmak için %bet_amount%$ gerekiyor.'
    party-too-large: '{PREFIX} &cPartinin %party_size% üyesi var, ama bu kuyruk %team_size% kişilik takımlara izin veriyor.'
