    set-arena-item: '{PREFIX} &7Arena &e%name%&7''nin görünen eşyası tuttuğun eşyaya değiştirildi.'
    create-queue: '{PREFIX} &7&3%kit% &7kiti ve &6$%bet_amount% &7bahisli kuyruk oluşturuldu.'
    delete-queue: '{PREFIX} &7&3%kit% &7kiti ve &6$%bet_amount% &7bahisli kuyruk silindi.'
