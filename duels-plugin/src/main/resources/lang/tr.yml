    del-sign: '{PREFIX} &7&f%location%&7 konumundaki &3%kit% &7kiti ve &6$%bet_amount% &7bahisli kuyruk tabelası silindi.'
    set-lobby: '{PREFIX} &7Duel lobisi bulunduğun konuma ayarlandı.'
    lobby: '{PREFIX} &7Lobiye ışınlandın!'
    edit: '{PREFIX} &7&f%name%&7 için şu işlem gerçekleştirildi: &f%action% %amount% %type%'
    set-rating: '{PREFIX} &f%name%&7''nin &3%kit% &7kiti için reytingi &a%rating%&7 olarak ayarlandı.'
    reset-rating: '{PREFIX} &7&f%name%&7''nin &3%kit% &7kiti reytingi sıfırlandı.'
    reset: '{PREFIX} &7&f%name%&7''nin istatistikleri sıfırlandı.'
    info:
      - '{HALF_LINE} &7Arena &e%name% {HALF_LINE}'
      - '&7Kullanımda: &r%in_use%'
      - '&7Devre Dışı: &r%disabled%'
      - '&7Bağlı Kitler: &3%kits%'
      - '&7Konumlar: &f%positions%'
      - '&7Oyuncular: &f%players%'
      - '{HALF_LINE} &7Arena &e%name% {HALF_LINE}'
