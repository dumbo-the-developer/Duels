COMMAND:
  kit:
    usage: '{PREFIX} &cKullanım: /kit [edit|save|reset] [oyuncu] [kit adı]'
    edit:
      usage: '{PREFIX} &cKullanım: /kit edit <kit adı>'
    reset:
      usage: '{PREFIX} &cKullanım: /kit reset <kit adı> veya /kit reset <oyuncu> <kit adı>'
    unknown-subcommand: '{PREFIX} &cBilinmeyen alt komut: %subcommand%'
  duel:
    usage:
      - '{LINE}'
      - '&f/%command% [oyuncu] &e- &7Oyuncuya duel isteği gönderir.'
      - '&f/%command% [oyuncu] <miktar> &e- &7Bahisli duel isteği gönderir.'
      - '&f/%command% [accept | deny] [oyuncu] &e- &7Duel isteğini kabul eder veya reddeder.'
      - '&f/%command% stats <ad> &e- &7Duel istatistiklerini gösterir.'
      - '&f/%command% toggle &e- &7Duel isteklerini aç/kapat.'
      - '&f/%command% top [-|wins|losses|kit] &e- &7En iyi galibiyet, mağlubiyet veya kit reytingini gösterir.'
      - '{LINE}'
    request:
      send:
        sender:
          - '{LINE}'
          - '&7Duel isteği &f%name%&7 adlı oyuncuya gönderildi.'
          - '&6- &7Kit: &3%kit%'
          - '&6- &7Kendi Envanteri: &r%own_inventory%'
          - '&6- &7Arena: &e%arena%'
          - '&6- &7Bahis: &6$%bet_amount%'
          - '&6- &7Eşya Bahsi: &r%item_betting%'
          - '{LINE}'
        receiver:
          - '{LINE}'
          - '&7&f%name%&7 adlı oyuncudan duel isteği aldın.'
          - '&6- &7Kit: &3%kit%'
          - '&6- &7Kendi Envanteri: &r%own_inventory%'
          - '&6- &7Arena: &e%arena%'
          - '&6- &7Bahis: &6$%bet_amount%'
          - '&6- &7Eşya Bahsi: &r%item_betting%'
          - '{LINE}'
        clickable-text:
          info:
            text: '&7Tıkla: '
            hover-text: ''
          accept:
            text: '&a&l[KABUL] '
            hover-text: '&7Bu isteği &akabul etmek &7için tıkla.'
          deny:
            text: '&c&l[RED]'
            hover-text: '&7Bu isteği &creddetmek &7için tıkla.'
      accept:
        sender: '{PREFIX} &f%name% &7duel isteğini kabul etti.'
        receiver: '{PREFIX} &7&f%name%&7 adlı oyuncunun duel isteği kabul edildi.'
      deny:
        sender: '{PREFIX} &7&f%name%&7 adlı oyuncuya gönderilen duel isteği reddedildi.'
        receiver: '{PREFIX} &7&f%name%&7 adlı oyuncunun duel isteği reddedildi.'
    party-request:
      send:
        sender-party:
          - '{LINE}'
          - '&f%owner% &7tarafından &f%name%''nin Partisi&7ne duel isteği gönderildi.'
          - '&6- &7Kit: &3%kit%'
          - '&6- &7Kendi Envanteri: &r%own_inventory%'
          - '&6- &7Arena: &e%arena%'
          - '{LINE}'
        receiver-party:
          - '{LINE}'
          - '&7&f%name%''nin Partisi&7nden duel isteği alındı.'
          - '&6- &7Kit: &3%kit%'
          - '&6- &7Kendi Envanteri: &r%own_inventory%'
          - '&6- &7Arena: &e%arena%'
        clickable-text:
          info:
            text: '&7Tıkla: '
            hover-text: ''
          accept:
            text: '&a&l[KABUL] '
            hover-text: '&7Bu isteği &akabul etmek &7için tıkla.'
          deny:
            text: '&c&l[RED]'
            hover-text: '&7Bu isteği &creddetmek &7için tıkla.'
          extra:
            text: '{LINE}'
            hover-text: ''
      accept:
        sender-party:
          - '{LINE}'
          - '{PREFIX} &f%name%''nin Partisi &7&f%owner%&7''nin duel isteğini kabul etti.'
          - '{LINE}'
        receiver-party:
          - '{LINE}'
          - '{PREFIX} &f%owner% &7&f%name%''nin Partisi&7nden gelen duel isteğini kabul etti.'
          - '{LINE}'
      deny:
        sender-party:
          - '{LINE}'
          - '{PREFIX} &f%name%''nin Partisi &7&f%owner%&7''nin duel isteğini reddetti.'
          - '{LINE}'
        receiver-party:
          - '{LINE}'
          - '{PREFIX} &7&f%owner%&7 &f%name%''nin Partisi&7nden gelen duel isteğini reddetti.'
          - '{LINE}'
    stats:
      displayed:
        - '{LINE}'
        - '&7&f%name% &7İstatistikleri &e-'
        - '&7Galibiyet: &a%wins%'
        - '&7Mağlubiyet: &c%losses%'
        - '&7G/M Oranı: &b%wl_ratio%'
        - '&7İstekler: &r%requests_enabled%'
      rating:
        header: '&7Reytingler &e-'
        format: '&f%type%&7: &b%rating%'
        footer: ''
      match:
        header: '&7Son Maçlar &e-'
        format: '&a%winner% &fvs &c%loser% &6[Üzerime Gel!]'
        hover-text:
          - '&7Kit: &3%kit%'
          - '&7Süre: &a%duration%'
          - '&7Zaman: &f%time% önce'
          - '&7Can: &d%health%❤'
        footer: '{LINE}'
    toggle:
      enabled: '{PREFIX} &aArtık duel istekleri alıyorsun.'
      disabled: '{PREFIX} &cArtık duel istekleri almıyorsun.'
    top:
      next-update: '{PREFIX} &7Sonraki güncelleme: &f%remaining%'
      header: '{HALF_LINE} &7İlk &f10 &7%type% {HALF_LINE}'
      display-format: '&e%rank%. &f%name% &e- &f%score% &7%identifier%'
      footer: '{HALF_LINE} &7İlk &f10 &7%type% {HALF_LINE}'

  duels:
    usage:
      - '{LINE}'
      - '&f/%command% help &e- &7Bu sayfayı gösterir.'
      - '&f/%command% help arena &e- &7Arena komutlarını listeler.'
      - '&f/%command% help kit &e- &7Kit komutlarını listeler.'
      - '&f/%command% help queue &e- &7Kuyruk komutlarını listeler.'
      - '&f/%command% help sign &e- &7Tabela komutlarını listeler.'
      - '&f/%command% help user &e- &7Kullanıcı düzenleme komutlarını listeler.'
      - '&f/%command% help extra &e- &7Ekstra komutları listeler.'
      - '{LINE}'
    help:
      arena:
        - '{HALF_LINE} &fArena Komutları {HALF_LINE}'
        - '&f/%command% create [ad] &e- &7Verilen adla arena oluşturur.'
        - '&f/%command% set [ad] [1|2] &e- &7Arenaya ışınlanma konumu belirler.'
        - '&f/%command% delete [ad] &e- &7Arenayı siler.'
        - '&f/%command% setarenaitem [ad] &e- &7Seçilen arena için görünen eşyayı ayarlar.'
        - '&f/%command% info [ad] &e- &7Arena hakkında bilgi listeler.'
        - '&f/%command% toggle [ad] &e- &7Arenayı aktif/devre dışı yapar.'
        - '&f/%command% tp [ad] <1|2> &e- &7Arenaya ışınlar.'
        - '&f/%command% list &e- &7Tüm arenaları listeler.'
        - '{HALF_LINE} &fArena Komutları {HALF_LINE}'
      kit:
        - '{HALF_LINE} &fKit Komutları {HALF_LINE}'
        - '&f/%command% savekit <-o> [ad] &e- &7Verilen adla kit kaydeder.'
        - '&f/%command% loadkit [ad] &e- &7Seçilen kiti envantere yükler.'
        - '&f/%command% kitgive [kit] [oyuncu] &e- &7Oyuncuya kit verir.'
        - '&f/%command% deletekit [ad] &e- &7Kiti siler.'
        - '&f/%command% setitem [ad] &e- &7Seçilen kit için görünen eşyayı ayarlar.'
        - '&f/%command% options [kit] &e- &7Seçilen kit için ayarlar arayüzünü açar.'
        - '&f/%command% bind [kit] &e- &7Seçilen kit için arena bağlama arayüzünü açar.'
        - '&f/%command% list &e- &7Tüm kitleri listeler.'
        - '{HALF_LINE} &fKit Komutları {HALF_LINE}'
      queue:
        - '{HALF_LINE} &fKuyruk Komutları {HALF_LINE}'
        - '&f/%command% createqueue [bahis] [-|kit] &e- &7Bahisli ve kitli kuyruk oluşturur.'
        - '&f/%command% deletequeue &e- &7Kuyruğu siler.'
        - '&f/%command% list &e- &7Mevcut kuyrukları listeler.'
        - '{HALF_LINE} &fKuyruk Komutları {HALF_LINE}'
      sign:
        - '{HALF_LINE} &fTabela Komutları {HALF_LINE}'
        - '&f/%command% addsign [bahis] [-|kit] &e- &7Bahisli ve kitli kuyruk tabelası oluşturur.'
        - '&f/%command% delsign &e- &7Baktığın kuyruk tabelasını siler.'
        - '&f/%command% list &e- &7Kuyruk tabelalarını listeler.'
        - '{HALF_LINE} &fTabela Komutları {HALF_LINE}'
      user:
        - '{HALF_LINE} &fKullanıcı Düzenleme Komutları {HALF_LINE}'
        - '&f/%command% setrating [ad] [-|kit] [miktar] &e- &7Oyuncunun kit reytingini ayarlar.'
        - '&f/%command% edit [ad] [add|remove|set] [wins|losses] [miktar] &e- &7Oyuncu istatistiklerini düzenler.'
        - '&f/%command% resetrating [ad] [-|kit|all] &e- &7Oyuncunun reyting(ler)ini sıfırlar.'
        - '&f/%command% reset [ad] &e- &7Oyuncunun istatistiklerini sıfırlar.'
        - '{HALF_LINE} &fKullanıcı Düzenleme Komutları {HALF_LINE}'
      extra:
        - '{HALF_LINE} &fEkstra Komutlar {HALF_LINE}'
        - '&f/%command% setlobby &e- &7Duel lobisi konumunu ayarlar.'
        - '&f/%command% lobby &e- &7Duel lobisine ışınlar.'
        - '&f/%command% playsound [ad] &e- &7Yapılandırmada tanımlı sesi çalar.'
        - '&f/%command% reload <modül> &e- &7Eklentiyi veya belirtilen modülü yeniden yükler.'
        - '{HALF_LINE} &fEkstra Komutlar {HALF_LINE}'
    create: '{PREFIX} &7Arena &e%name% &7başarıyla oluşturuldu. Doğum noktası belirlemek için &f/duels set %name% 1 &7kullan.'
